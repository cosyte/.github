version: 2

# `cosyte/.github` hosts the org-wide REUSABLE workflows (ci.yml, release.yml,
# nightly-fuzz.yml, drift-check.yml). Every parser is a thin caller, so an
# action bump here propagates to every consumer the next time the caller
# pulls @main. Dependabot is configured for `github-actions` only — this
# repo has no npm/pnpm package and therefore no language ecosystem to track.
#
# Mirrors the per-parser config in `cosyte/{hl7,mllp,dicom,x12,ccda,ncpdp,
# config}/.github/dependabot.yml` (Maturity Phase 3, 2026-06-26), closing the
# gap that left the shared pipeline's action pins (actions/checkout,
# actions/setup-node, pnpm/action-setup, reviewdog/action-actionlint) without
# Dependabot coverage.

updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
