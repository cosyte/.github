name: CI

# Reusable CI for @cosyte/* packages.
# Caller (each repo's .github/workflows/ci.yml):
#   jobs:
#     ci:
#       uses: cosyte/.github/.github/workflows/ci.yml@main
#       with: { run-phi-scan: true }      # byte/PHI parsers
# Universal gates: typecheck . lint(--max-warnings=0) . format:check . [PHI scan] . test .
# coverage(gating) . build . attw . dual ESM/CJS smoke . actionlint. Actions are pinned to SHAs.

on:
  workflow_call:
    inputs:
      node-versions:
        description: "JSON array of Node versions for the matrix."
        type: string
        default: '["22", "24"]'
      os:
        description: "JSON array of runner OSes for the matrix."
        type: string
        default: '["ubuntu-latest"]'
      run-phi-scan:
        description: "Run the repo's PHI scanner (pnpm phi-scan)."
        type: boolean
        default: false
      run-actionlint:
        description: "Lint the repo's workflow files with actionlint."
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJSON(inputs.node-versions) }}
        os: ${{ fromJSON(inputs.os) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - if: ${{ inputs.run-phi-scan }}
        run: pnpm phi-scan
      - run: pnpm test
      - run: pnpm test:coverage
      - run: pnpm build
      - run: pnpm attw
      - name: Dual ESM/CJS smoke
        shell: bash
        run: |
          test -f dist/index.mjs && test -f dist/index.cjs && test -f dist/index.d.ts
          node -e "import('file://' + process.cwd() + '/dist/index.mjs').then(() => console.log('esm ok'))"
          node -e "require('./dist/index.cjs'); console.log('cjs ok')"

  actionlint:
    if: ${{ inputs.run-actionlint }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
        with:
          fail_on_error: true
