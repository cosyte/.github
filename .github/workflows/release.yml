name: Release

# Reusable release for @cosyte/* packages.
# Caller (each repo's .github/workflows/release.yml):
#   jobs:
#     release:
#       uses: cosyte/.github/.github/workflows/release.yml@main
#       with: { package-name: "@cosyte/hl7" }
#       secrets: inherit
# Changesets flow: a push to main with pending changesets opens a "Version Packages" PR; merging it
# bumps versions and publishes to npm WITH PROVENANCE, uploads the docs artifacts, and fires a
# repository_dispatch to cosyte/docs so the site rebuilds. Actions are pinned to SHAs.

on:
  workflow_call:
    inputs:
      package-name:
        description: "npm package name, used for the release tag + docs dispatch (e.g. @cosyte/hl7)."
        type: string
        required: true
      dispatch-docs:
        description: "Fire a repository_dispatch to cosyte/docs after publishing."
        type: boolean
        default: true
      pack-docs-cmd:
        description: "Command that builds dist-artifacts/{docs-content,source}.tar.gz."
        type: string
        default: "pnpm pack:docs"
    secrets:
      NPM_TOKEN:
        required: true
      DOCS_REPO_DISPATCH_TOKEN:
        required: false

permissions:
  contents: write # create tags / GitHub release
  id-token: write # npm provenance
  pull-requests: write # open the "Version Packages" PR

jobs:
  release:
    runs-on: ubuntu-latest
    # The human gate on npm publish. Every caller repo has a PROTECTED `release` environment
    # (required reviewer + a main-only deployment-branch policy), so both the version-PR step and
    # the publish step wait for an explicit approval — nothing reaches npm unattended.
    #
    # Required reviewers are a PUBLIC-repo feature on GitHub Team (private repos need Enterprise),
    # which is why this reference could only be added once the parsers went public. Add the
    # protected environment to a caller BEFORE it calls this workflow: if the environment does not
    # exist, GitHub silently auto-creates an UNPROTECTED one on the first run, and you get a gate
    # that gates nothing while looking like it does.
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify
        run: |
          pnpm typecheck
          pnpm lint
          pnpm test
          pnpm build
          pnpm attw
      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          # `pnpm run version` — NOT `pnpm version`, which is pnpm's built-in and shadows the script.
          version: pnpm run version
          publish: pnpm run release
          # Defaults to TRUE, which cuts a SECOND GitHub release next to the one the upload step
          # below creates — two releases for one publish (x12 shipped 0.0.1 that way). It is also
          # the wrong release: it carries no docs artifacts, and because every caller sets
          # `"changelog": false` and hand-maintains CHANGELOG.md, the action finds no `## <version>`
          # heading and dumps the WHOLE file — `## [Unreleased]` and all — into the release body.
          # `changeset publish` still creates and pushes the `v<version>` git tag; the step below
          # attaches the artifacts to it.
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # npm provenance requires a PUBLIC source repo; auto-enables when the calling repo is public.
          NPM_CONFIG_PROVENANCE: ${{ github.event.repository.visibility == 'public' }}
      - name: Upload docs artifacts + dispatch docs rebuild
        if: ${{ steps.changesets.outputs.published == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_TOKEN: ${{ secrets.DOCS_REPO_DISPATCH_TOKEN }}
          PACKAGE_NAME: ${{ inputs.package-name }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
          PACK_DOCS_CMD: ${{ inputs.pack-docs-cmd }}
          DISPATCH_DOCS: ${{ inputs.dispatch-docs }}
        shell: bash
        run: |
          version=$(node -e "const p=JSON.parse(process.env.PUBLISHED_PACKAGES); const m=p.find(x=>x.name===process.env.PACKAGE_NAME)||p[0]; process.stdout.write(m.version)")
          # MUST match the tag `changeset publish` just pushed, and MUST stay parseable by
          # cosyte/docs. Every caller of this workflow is a single-package repo, for which
          # Changesets tags `v<version>`; it uses `<pkg>@<version>` only in a multi-package repo.
          # This once read "${PACKAGE_NAME}@${version}", which cut a second release at a tag that
          # existed nowhere else — and docs' parseTag() (`/^(\d+)\.(\d+)\.(\d+)/` after stripping a
          # leading `v`) returns null for "@cosyte/x12@0.0.1", so the version slot it derives,
          # `versioned_docs/version-@cosyte/x12@0.0.1`, carries a `/` and is not a directory name.
          # docs keeps only releases carrying docs-content.tar.gz, so it would have selected exactly
          # that broken tag and skipped the good one.
          tag="v${version}"
          bash -c "$PACK_DOCS_CMD"
          if [ -f dist-artifacts/docs-content.tar.gz ]; then
            # `--target` is REQUIRED. `changeset publish` creates the v<version> tag only in the
            # runner's local clone; it was changesets/action that pushed it, and it does that ONLY
            # when createGithubReleases is true — which we turn off above to avoid a duplicate
            # release. So the tag never reaches the remote, and `gh release create` refuses with
            # "tag v0.0.1 exists locally but has not been pushed". Pointing --target at this commit
            # makes gh create the tag itself, which is what we want: one tag, one release, both
            # created here.
            gh release upload "$tag" dist-artifacts/docs-content.tar.gz dist-artifacts/source.tar.gz --clobber \
              || gh release create "$tag" dist-artifacts/docs-content.tar.gz dist-artifacts/source.tar.gz \
                   --target "$GITHUB_SHA" --title "$tag" --notes "Automated release of $tag."
          fi
          if [ "$DISPATCH_DOCS" = "true" ] && [ -n "$DISPATCH_TOKEN" ]; then
            GH_TOKEN="$DISPATCH_TOKEN" gh api repos/cosyte/docs/dispatches \
              -f event_type=package-released \
              -F "client_payload[package]=$PACKAGE_NAME" \
              -F "client_payload[version]=$version"
          fi
